<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reportes — Gestión de Empleados</title>
  <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">👥 Gestión de Empleados</div>
    <ul class="nav-links">
      <li><a href="../index.html">Inicio</a></li>
      <li><a href="empleados.html">Empleados</a></li>
      <li><a href="registrar.html">Registrar</a></li>
      <li><a href="reportes.html" class="active">Reportes</a></li>
      <li><a href="vacaciones.html">Vacaciones</a></li>
    </ul>
  </nav>

  <main class="container">
    <div class="page-header">
      <h2>📊 Reportes de Nómina</h2>
    </div>

    <div id="alerta" class="alerta hidden"></div>

    <!-- Generar nómina -->
    <div class="card-form">
      <h3>Generar Nómina</h3>
      <div class="form-row">
        <div class="form-group">
          <label>Empleado</label>
          <select id="selEmpleado">
            <option value="">Cargando...</option>
          </select>
        </div>
        <div class="form-group">
          <label>Período (YYYY-MM)</label>
          <input type="month" id="periodo" />
        </div>
        <div class="form-group">
          <label>Bonificaciones ($)</label>
          <input type="number" id="bonificaciones" value="0" min="0" />
        </div>
        <div class="form-group" style="align-self:flex-end">
          <button class="btn btn-primary" onclick="generarNomina()">Calcular y Guardar</button>
        </div>
      </div>
    </div>

    <!-- Historial de nómina -->
    <div class="card-form">
      <h3>Historial de Nómina</h3>
      <div class="tabla-wrapper">
        <table class="tabla">
          <thead>
            <tr><th>Empleado</th><th>Cargo</th><th>Período</th><th>Salario Base</th><th>Bonificaciones</th><th>Deducciones</th><th>Salario Neto</th></tr>
          </thead>
          <tbody id="bodyNomina">
            <tr><td colspan="7" class="text-center">Cargando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="../js/script.js"></script>
  <script>
    const API_EMP = '../api/empleados.php';
    const API_REP = '../api/reportes.php';

    async function cargarEmpleados() {
      const res  = await fetch(API_EMP + '?accion=listar');
      const data = await res.json();
      const sel  = document.getElementById('selEmpleado');
      sel.innerHTML = '<option value="">— Seleccionar —</option>' +
        data.map(e => `<option value="${e.id}">${e.nombre} ${e.apellido}</option>`).join('');
    }

    async function cargarNomina() {
      try {
        const res  = await fetch(API_REP + '?accion=historial');
        const data = await res.json();
        const tbody = document.getElementById('bodyNomina');
        if (!data.length) {
          tbody.innerHTML = '<tr><td colspan="7" class="text-center">No hay registros de nómina.</td></tr>';
          return;
        }
        tbody.innerHTML = data.map(r => `
          <tr>
            <td>${r.empleado}</td>
            <td>${r.cargo}</td>
            <td>${r.periodo}</td>
            <td>$${Number(r.salario_base).toLocaleString('es-CO')}</td>
            <td>$${Number(r.bonificaciones).toLocaleString('es-CO')}</td>
            <td>$${Number(r.deducciones).toLocaleString('es-CO')}</td>
            <td><strong>$${Number(r.salario_neto).toLocaleString('es-CO')}</strong></td>
          </tr>
        `).join('');
      } catch(err) {
        mostrarAlerta('Error al cargar nómina: ' + err.message, 'error');
      }
    }

    async function generarNomina() {
      const empleadoId    = document.getElementById('selEmpleado').value;
      const periodo       = document.getElementById('periodo').value;
      const bonificaciones = parseFloat(document.getElementById('bonificaciones').value) || 0;

      if (!empleadoId || !periodo) {
        mostrarAlerta('Selecciona empleado y período.', 'error'); return;
      }

      const res  = await fetch(API_REP, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ accion: 'generar', empleado_id: empleadoId, periodo, bonificaciones })
      });
      const data = await res.json();
      mostrarAlerta(data.exito
        ? `Nómina generada. Salario neto: $${Number(data.salario_neto).toLocaleString('es-CO')}`
        : (data.mensaje || 'Error'), data.exito ? 'success' : 'error');
      if (data.exito) cargarNomina();
    }

    function mostrarAlerta(msg, tipo) {
      const el = document.getElementById('alerta');
      el.textContent = msg;
      el.className = `alerta alerta-${tipo}`;
    }

    cargarEmpleados();
    cargarNomina();
  </script>
</body>
</html>
