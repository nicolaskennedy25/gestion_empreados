<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Empleados — Gestión de Empleados</title>
  <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">👥 Gestión de Empleados</div>
    <ul class="nav-links">
      <li><a href="../index.html">Inicio</a></li>
      <li><a href="empleados.html" class="active">Empleados</a></li>
      <li><a href="registrar.html">Registrar</a></li>
      <li><a href="reportes.html">Reportes</a></li>
      <li><a href="vacaciones.html">Vacaciones</a></li>
    </ul>
  </nav>

  <main class="container">
    <div class="page-header">
      <h2>👥 Lista de Empleados</h2>
      <a href="registrar.html" class="btn btn-primary">+ Nuevo Empleado</a>
    </div>

    <div id="alerta" class="alerta hidden"></div>

    <div class="tabla-wrapper">
      <table class="tabla" id="tablaEmpleados">
        <thead>
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Cargo</th>
            <th>Tipo</th>
            <th>Salario Base</th>
            <th>Fecha Ingreso</th>
            <th>Email</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="bodyEmpleados">
          <tr><td colspan="8" class="text-center">Cargando empleados...</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <script src="../js/script.js"></script>
  <script>
    const API = '../api/empleados.php';

    async function cargarEmpleados() {
      try {
        const res  = await fetch(API + '?accion=listar');
        const data = await res.json();
        const tbody = document.getElementById('bodyEmpleados');

        if (!data.length) {
          tbody.innerHTML = '<tr><td colspan="8" class="text-center">No hay empleados registrados.</td></tr>';
          return;
        }

        tbody.innerHTML = data.map(e => `
          <tr>
            <td>${e.id}</td>
            <td>${e.nombre} ${e.apellido}</td>
            <td>${e.cargo}</td>
            <td><span class="badge badge-${e.tipo}">${e.tipo.replace('_',' ')}</span></td>
            <td>$${Number(e.salario_base).toLocaleString('es-CO')}</td>
            <td>${e.fecha_ingreso}</td>
            <td>${e.email || '—'}</td>
            <td>
              <button class="btn btn-sm btn-danger" onclick="eliminar(${e.id}, '${e.nombre}')">Eliminar</button>
            </td>
          </tr>
        `).join('');
      } catch(err) {
        mostrarAlerta('Error al cargar empleados: ' + err.message, 'error');
      }
    }

    async function eliminar(id, nombre) {
      if (!confirm(`¿Deseas eliminar a ${nombre}?`)) return;
      try {
        const res  = await fetch(API, {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ accion: 'eliminar', id })
        });
        const data = await res.json();
        mostrarAlerta(data.mensaje, data.exito ? 'success' : 'error');
        if (data.exito) cargarEmpleados();
      } catch(err) {
        mostrarAlerta('Error: ' + err.message, 'error');
      }
    }

    function mostrarAlerta(msg, tipo) {
      const el = document.getElementById('alerta');
      el.textContent = msg;
      el.className = `alerta alerta-${tipo}`;
    }

    cargarEmpleados();
  </script>
</body>
</html>
